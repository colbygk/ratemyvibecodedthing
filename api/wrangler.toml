name = "rmvct-api"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Allowed CORS origins (comma-separated). The Worker reflects whichever matches
# the request. HTTPS is now enforced on the apex, so the insecure http:// origin
# has been dropped; localhost stays for dev (vite 5173 / preview 4173).
[vars]
ALLOWED_ORIGIN = "https://ratemyvibecodedthing.ai,http://localhost:5173,http://localhost:4173"
# Daily usage caps (graceful 429 when exceeded). Defaults live in src/lib/quota.js;
# uncomment to override. See docs/COST.md.
# LIMIT_REQUEST = "20000"
# LIMIT_R2_UPLOAD = "500"
# LIMIT_R2_READ = "20000"
# MAX_STORAGE_BYTES = "9663676416"   # ~9 GB
# MAX_UPLOAD_BYTES = "26214400"      # 25 MB

# ---- Cloudflare R2 bucket for user-uploaded images/video ----
# Enabled. Bucket created via `wrangler r2 bucket create rmvct-media`.
# The MEDIA binding powers uploadMedia()/serveMedia() in src/index.js.
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "rmvct-media"

# ---- Secrets (set via `wrangler secret put <NAME>`; do NOT commit) ----
#   UPSTASH_REDIS_REST_URL    e.g. https://xxxx.upstash.io
#   UPSTASH_REDIS_REST_TOKEN  Upstash REST token
#   JWT_SECRET                long random string for signing sessions
#
# Custom domain route (set up in Cloudflare dashboard or here):
# [[routes]]
# pattern = "api.ratemyvibecodedthing.ai"
# custom_domain = true
